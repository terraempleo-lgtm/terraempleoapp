name: Deploy TerraEmpleo

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'TerraEmpleo_API.postman_collection.json'
      - '.gitignore'
      - 'assets/login_original_backup.jpg'

jobs:
  # ─── Detectar qué cambió ──────────────────────────────────────────────────
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'TerraEmpleoApp/backend/**'
            frontend:
              - 'TerraEmpleoApp/**'
              - '!TerraEmpleoApp/backend/**'

  # ─── Job 1: Backend → Lightsail ───────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Lightsail)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/terraempleoapp

            echo "→ Preservando .env de producción..."
            [ -f .env ] && cp .env /tmp/.env.prod.bak
            [ -f TerraEmpleoApp/backend/.env ] && cp TerraEmpleoApp/backend/.env /tmp/backend.env.prod.bak

            echo "→ Actualizando código..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Restaurando .env de producción..."
            [ -f /tmp/.env.prod.bak ] && mv /tmp/.env.prod.bak .env
            [ -f /tmp/backend.env.prod.bak ] && mv /tmp/backend.env.prod.bak TerraEmpleoApp/backend/.env

            echo "→ Instalando dependencias..."
            cd TerraEmpleoApp/backend
            npm install --production --prefer-offline

            echo "→ Reiniciando servidor..."
            pm2 restart terraempleo-api

            echo "→ Verificando salud..."
            sleep 3
            curl -sf http://localhost:3000/api/health | grep '"status":"OK"' \
              && echo "✓ API saludable" \
              || (echo "✗ Health check fallido" && exit 1)

  # ─── Job 2: Frontend → S3 + CloudFront ───────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TerraEmpleoApp/package-lock.json

      - name: Instalar dependencias
        working-directory: TerraEmpleoApp
        run: npm ci

      - name: Build web
        working-directory: TerraEmpleoApp
        env:
          EXPO_PUBLIC_API_URL: https://api.terrampleo.com/api
        run: npx expo export --platform web

      - name: Subir a S3
        working-directory: TerraEmpleoApp
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # index.html sin caché (siempre actualizado)
          aws s3 cp dist/index.html s3://terraempleo-web-frontend/index.html \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate"

          # Resto de archivos con caché de 1 año (tienen hash en el nombre)
          aws s3 sync dist/ s3://terraempleo-web-frontend/ \
            --exclude "index.html" \
            --exclude "metadata.json" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Invalidar caché de CloudFront
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✓ Caché de CloudFront invalidada"
