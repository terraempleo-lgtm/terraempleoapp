name: EAS Update (OTA)

# Dispara un OTA update con EAS cuando se pushea a `main` y SOLO cambiaron
# archivos seguros para OTA (código JS). Si cambia algo nativo (app.json,
# eas.json, package.json, plugins, permisos, etc.) el workflow se salta y hay
# que hacer build nuevo + subir a stores manualmente.

on:
  push:
    branches:
      - main
    paths:
      - 'TerraEmpleoApp/src/**'
      - 'TerraEmpleoApp/assets/**'
      - 'TerraEmpleoApp/App.js'

jobs:
  eas-update:
    name: Publicar OTA con EAS Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verificar EXPO_TOKEN
        id: check_token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN no configurado — saltando OTA update."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        if: steps.check_token.outputs.skip != 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.check_token.outputs.skip != 'true'
        working-directory: TerraEmpleoApp
        run: npm ci

      - name: Publish update
        if: steps.check_token.outputs.skip != 'true'
        working-directory: TerraEmpleoApp
        run: |
          MSG=$(git log -1 --pretty=%s)
          npx eas update --branch production --message "$MSG" --non-interactive
